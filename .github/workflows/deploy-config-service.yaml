name: Deploy Config Service

on:
  push:
    branches:
      - master
    paths:
      - 'config-service/**' # Only triggers if files in this directory change

env:
  # The base image name without the tag
  IMAGE_NAME: anuj55149/lovable-config-service

# CRITICAL: These permissions are required for GCP Workload Identity Federation
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy to GKE
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java 21 (Matches your pom.xml)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Caches ~/.m2 directory to drastically speed up future builds

      # 3. Build and Push directly using Google Jib (No Docker daemon needed)
      - name: Build and Push Docker Image with Jib
        working-directory: ./config-service
        run: |
          ./mvnw compile jib:build \
            -Djib.to.image=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }} \
            -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Secure, keyless authentication to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      # 5. Connect to the GKE Cluster
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER }}
          location: ${{ secrets.GCP_ZONE }}

      # 6. Trigger the Zero-Downtime Rolling Update in Kubernetes
      - name: Deploy to GKE
        run: |
          kubectl set image deployment/config-service config-service=${{ env.IMAGE_NAME }}:${{ github.sha }} -n lovable-core
          
          # This command pauses the pipeline until the new pods are fully ready and healthy
          kubectl rollout status deployment/config-service -n lovable-core

# 1. Create a dedicated ServiceAccount in lovable-core
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-service-account
  namespace: lovable-core

---
# 2. Create a Role in lovable-previews with the exact permissions Fabric8 needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-manager-role
  namespace: lovable-previews
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# 3. Bind the ServiceAccount (from lovable-core) to the Role (in lovable-previews)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-manager-binding
  namespace: lovable-previews
subjects:
  - kind: ServiceAccount
    name: workspace-service-account
    namespace: lovable-core # Note the cross-namespace reference here
roleRef:
  kind: Role
  name: preview-manager-role
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-service
  namespace: lovable-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-service
  template:
    metadata:
      labels:
        app: workspace-service
    spec:
      serviceAccountName: workspace-service-account
      containers:
        - name: workspace-service
          image: anuj55149/lovable-workspace-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9020
          envFrom:
            - configMapRef:
                name: lovable-shared-config
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: CONFIG_SERVER_URL
              value: http://config-service.lovable-core.svc.cluster.local:8888
            - name: SPRING_CLOUD_CONFIG_FAIL_FAST
              value: "false"
            - name: SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS
              value: "10"
            - name: SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL
              value: "3000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WORKSPACE_DB_PASSWORD
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /workspace/actuator/health
              port: 9020
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /workspace/actuator/health
              port: 9020
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: workspace-service
  namespace: lovable-core
spec:
  selector:
    app: workspace-service
  ports:
    - port: 80
      targetPort: 9020